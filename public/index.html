<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div class="container">
        <form id="loginForm">
            <h2>Secure Login</h2>
            <div class="input-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="e.g. asif@email.com" required>
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Login</button>
            <div class="footer-links" style="margin-top: 20px;">
                <a href="forgot-password.html" class="nav-btn">Forgot Password?</a>
                <a href="register.html" class="nav-btn">Don't have an account? Register here</a>
            </div>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
